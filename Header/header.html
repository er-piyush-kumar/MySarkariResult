<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            color: #333;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ab183d;
            padding: 0.5rem 1.5rem; /* Reduced padding to decrease height */
            color: white;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 60px; /* Set a fixed height for the header */
        }

        /* Logo */
        .logo img {
            max-height: 2.5rem; /* Reduced logo height */
            max-width: 100%;
            object-fit: contain;
        }

        /* Site Name */
        .site-name h1 {
            margin: 0;
            font-size: 1.8rem; /* Reduced font size */
            text-align: center;
            color: white;
        }

        .site-name marquee {
            font-size: 0.8rem; /* Reduced font size */
            margin-top: 0.1rem; /* Adjusted margin */
        }

        /* Navigation Menu */
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 1rem;
        }

        nav ul li {
            display: inline-block;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.5rem;
            transition: all 0.1s ease-in-out;
        }

        nav ul li a:hover {
            background-color: #911530;
            border-radius: 5px;
            text-decoration: underline;
        }

        /* Mobile Navigation Toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 0.5rem;
        }

        .bar {
            height: 3px;
            width: 30px;
            background-color: white;
            margin: 2px 0;
        }

        /* Responsive Styles */

        /* For Medium Screens (Tablets) */
        @media (max-width: 1200px) {
            .logo img {
                max-height: 3rem; /* Further reduced logo height */
            }

            .site-name h1 {
                font-size: 1.5rem; /* Further reduced font size */
            }

            nav ul li a {
                font-size: 0.9rem;
            }
        }

        /* For Small Screens (Mobile) */
        @media (max-width: 768px) {
            header {
                padding: 0.5rem 1rem; /* Reduced padding for mobile */
            }

            nav {
                display: none; /* Hide nav by default on mobile */
                position: fixed; /* Fixed position for sidebar */
                top: 0;
                left: -100%; /* Start off-screen */
                width: 70%; /* Width of the sidebar */
                height: 100vh; /* Full height of the viewport */
                background-color: #ab183d;
                padding: 1rem;
                z-index: 999; /* Ensure it appears above other content */
                transition: left 0.3s ease-in-out; /* Smooth slide-in animation */
            }

            /* Show nav when 'active-nav' class is added */
            nav.active-nav {
                left: 0; /* Slide in from the left */
            }

            nav ul {
                flex-direction: column;
                align-items: flex-start; /* Align links to the left */
                width: 100%;
            }

            nav ul li {
                width: 100%;
                text-align: left; /* Align text to the left */
                padding: 0.5rem 0;
            }

            nav ul li a {
                font-size: 1rem;
                padding: 0.5rem 1rem;
            }

            .menu-toggle {
                display: flex;
            }
        }

        @media (max-width: 480px) {
            .site-name h1 {
                font-size: 1.2rem; /* Further reduced font size for small screens */
            }

            .site-name marquee {
                font-size: 0.7rem; /* Further reduced font size for small screens */
            }

            nav ul li a {
                font-size: 0.8rem;
            }

            .menu-toggle {
                padding: 0.3rem;
            }

            .bar {
                width: 25px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="https://mysarkariresult.in/">
                <img src="https://mysarkariresult.in/Images/logo.png" alt="Sarkari Result Logo">
            </a>
        </div>
        <div class="site-name">
            <h1>Sarkari Result</h1>
            <marquee>MySarkariResult.in</marquee>
        </div>
        <nav id="nav-menu">
            <ul>
                <li><a href="https://mysarkariresult.in/">Home</a></li>
                <li><a href="https://mysarkariresult.in/Leetcode/leetcode.html">Leetcode</a></li>
                <li><a href="https://mysarkariresult.in/Jobs/job-vacancies.html">Job Vacancies</a></li>
                <li><a href="https://mysarkariresult.in/Contact_Us/contact.html">Contact Us</a></li>
                <li><a href="#">Admit Card</a></li>
                <li><a href="#">Results</a></li>
            </ul>
        </nav>

        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </header>

    <!-- JavaScript for Mobile Menu Toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const mobileMenu = document.getElementById('mobile-menu');
            const nav = document.querySelector('nav');

            if (mobileMenu && nav) {
                mobileMenu.addEventListener('click', () => {
                    nav.classList.toggle('active-nav');
                });
            }
        });
    </script>
</body>
</html>
